name: Build Frontend

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Web (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

  package-electron:
    name: Package Electron App
    runs-on: windows-latest
    needs: verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build:electron

      - name: Upload renderer build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 5

      - name: Upload Electron build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-electron
          path: dist-electron
          retention-days: 5
