name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, e.g. v1.2.5'
        required: true
      backend_ref:
        description: 'Backend branch/tag/commit (optional; empty means backend default branch)'
        required: false
        default: ''
      prerelease:
        description: 'Publish as prerelease'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      NODE_VERSION: 22.12.0
      BACKEND_REPOSITORY: TiiJeiJ8/Constella_CORE
      BACKEND_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.backend_ref || 'default-branch' }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      IS_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || 'false' }}
      CONSTELLA_SERVER_ROOT: ./server-src

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout backend repository (explicit ref)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.backend_ref != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          ref: ${{ github.event.inputs.backend_ref }}
          path: server-src
          fetch-depth: 1

      - name: Checkout backend repository (default branch)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.backend_ref == ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          path: server-src
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server-src/package-lock.json

      - name: Validate release tag and synced versions
        run: |
          $releaseTag = "${env:RELEASE_TAG}"
          $frontendVersion = node -p "require('./package.json').version"
          $backendVersion = node -p "require('./server-src/package.json').version"
          $normalizedFrontend = $frontendVersion -replace '^v', ''
          $normalizedRelease = $releaseTag -replace '^v', ''

          if ($normalizedFrontend -ne $normalizedRelease) {
            throw "Release tag '$releaseTag' does not match frontend package.json version '$frontendVersion'."
          }

          if ($backendVersion -ne $normalizedFrontend) {
            throw "Backend version '$backendVersion' does not match frontend version '$frontendVersion'."
          }

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Install backend dependencies
        working-directory: server-src
        run: npm ci --no-audit --no-fund

      - name: Build desktop release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run build:electron:release

      - name: Collect release assets
        id: artifacts
        run: |
          $artifactDir = Join-Path (Get-Location) 'release-assets'
          if (Test-Path $artifactDir) {
            Remove-Item -LiteralPath $artifactDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $artifactDir | Out-Null

          $files = Get-ChildItem -Path 'dist-electron' -File | Where-Object {
            $_.Extension -in @('.exe', '.zip', '.yml', '.blockmap')
          }

          if (-not $files) {
            throw 'No release artifacts were found in dist-electron.'
          }

          $files | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $artifactDir $_.Name)
          }

          "artifact_dir=$artifactDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare release notes
        id: notes
        run: |
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          @"
          ## Desktop Release

          - Frontend tag: `${{ env.RELEASE_TAG }}`
          - Backend repository: `${{ env.BACKEND_REPOSITORY }}`
          - Backend ref: `${{ env.BACKEND_REF }}`
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Included artifacts

          - Windows installer (`.exe`)
          - Windows portable archive (`.zip`)

          GitHub generated release notes are appended below.
          "@ | Set-Content -LiteralPath $notesPath -Encoding utf8

          "notes_path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Constella ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: true
          append_body: true
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: ${{ steps.artifacts.outputs.artifact_dir }}\*